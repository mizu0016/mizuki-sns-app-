plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'com.google.gms.google-services'
}
android {
    namespace 'com.mizuki.sns'
    compileSdk 34
    defaultConfig {
        applicationId "com.mizuki.sns"
        minSdk 24
        targetSdk 34
    }
}
dependencies {
    implementation 'com.google.firebase:firebase-messaging-ktx:23.4.1'
}
